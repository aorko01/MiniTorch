name: tests
on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  # ── CPU tests on GitHub's free runners ──────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pybind11
        run: |
          python -m pip install --upgrade pip
          python -m pip install pybind11

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -Dpybind11_DIR="$(python -m pybind11 --cmakedir)"

      - name: Build
        run: cmake --build build --config Release -j 2

      - name: Test (CPU only)
        run: ctest --test-dir build --output-on-failure -E gpu

  # ── GPU tests on your self-hosted runner ────────────────────────────────────
  gpu-tests:
    runs-on: self-hosted
    needs: build-and-test          # only runs if CPU job passes
    if: github.event_name != 'pull_request'   # skip for PRs (security)
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pybind11
        run: |
          python -m pip install --upgrade pip
          python -m pip install pybind11

      - name: Verify GPU is available
        run: nvidia-smi

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_CUDA=ON \
            -DCMAKE_CUDA_COMPILER=/usr/lib/nvidia-cuda-toolkit/bin/nvcc \
            -Dpybind11_DIR="$(python -m pybind11 --cmakedir)"

      - name: Build
        run: cmake --build build --config Release -j 2

      - name: Test (GPU only)
        run: ctest --test-dir build --output-on-failure -L gpu